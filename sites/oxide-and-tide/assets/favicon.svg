<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Geometric silhouette of an analog pressure dial -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#84593C" stroke-width="8" />
  <circle cx="50" cy="50" r="35" fill="none" stroke="#22332B" stroke-width="2" />
  
  <!-- Dial ticks -->
  <line x1="50" y1="15" x2="50" y2="25" stroke="#22332B" stroke-width="3" />
  <line x1="50" y1="75" x2="50" y2="85" stroke="#22332B" stroke-width="3" />
  <line x1="15" y1="50" x2="25" y2="50" stroke="#22332B" stroke-width="3" />
  <line x1="75" y1="50" x2="85" y2="50" stroke="#22332B" stroke-width="3" />
  
  <!-- Cross-hatched with an anchor silhouette -->
  <path d="M50 25 L50 75 M40 35 L60 35" stroke="#1A1C1A" stroke-width="4" />
  <path d="M30 65 Q50 85 70 65" fill="none" stroke="#1A1C1A" stroke-width="4" />
  <circle cx="30" cy="65" r="4" fill="#1A1C1A" />
  <circle cx="70" cy="65" r="4" fill="#1A1C1A" />
  <circle cx="50" cy="25" r="5" fill="none" stroke="#1A1C1A" stroke-width="3" />
</svg>
